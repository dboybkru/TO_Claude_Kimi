name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Lint
        run: |
          pip install black flake8 isort
          black --check --line-length=100 app/
          flake8 --max-line-length=100 --ignore=E203,W503 app/
          isort --check-only --profile=black app/
      - name: Test
        run: pytest -xvs tests/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx
      - name: Build
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Expo export
        run: npx expo export

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t secureto-backend ./backend
      - name: Build frontend Docker image
        run: docker build -t secureto-frontend ./frontend-web
