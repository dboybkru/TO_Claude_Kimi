version: "3.9"

# Production docker-compose — use with:
#   docker compose -f docker-compose.prod.yml up -d
# Prerequisites:
#   - Copy backend/.env.example → backend/.env and fill all values
#   - Place SSL cert/key in ./nginx/ssl/cert.pem and ./nginx/ssl/key.pem
#   - Run: docker compose -f docker-compose.prod.yml exec backend alembic upgrade head

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alarm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-alarm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alarm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOT exposed externally in production
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    expose:
      - "9000"
      - "9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - celery_beat_data:/tmp/celery-beat
    command: celery -A app.worker beat --loglevel=info --schedule=/tmp/celery-beat/celerybeat-schedule

  nginx:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    # Note: frontend static files are baked into this image (multi-stage build)
    # nginx proxies /api/ → backend:8000 via the nginx.conf upstream block

volumes:
  postgres_data:
  redis_data:
  minio_data:
  celery_beat_data:
