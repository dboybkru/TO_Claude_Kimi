version: "3.9"

networks:
  secureto-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  minio_certs:

services:
  db:
    image: postgres:16-alpine
    container_name: secureto-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secureto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-secureto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - secureto-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secureto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secureto-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - secureto-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: secureto-minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - secureto-net

  backend:
    build: ./backend
    container_name: secureto-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/app/alembic
      - ./.env:/app/.env:ro
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - secureto-net
    command: >
      sh -c "echo 'DB URL: '$$DATABASE_URL && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    healthcheck:
      disable: true
    build: ./backend
    container_name: secureto-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - secureto-net
    command: celery -A app.tasks worker -l info

  beat:
    healthcheck:
      disable: true
    build: ./backend
    container_name: secureto-beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./.env:/app/.env:ro
    networks:
      - secureto-net
    command: celery -A app.tasks beat -l info --schedule=/tmp/celerybeat-schedule

  frontend:
    build: ./frontend-web
    container_name: secureto-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - secureto-net

  nginx:
    image: nginx:alpine
    container_name: secureto-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - secureto-net
