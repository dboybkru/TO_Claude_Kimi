[general]
static=yes
writeprotect=no
clearglobalvars=no

[voicebot]
; Inbound call from customer
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Set(CALLER_PHONE=${CALLERID(num)})
 same => n,Set(CALLED_AT=${STRFTIME(${EPOCH},,%Y-%m-%dT%H:%M:%S)})
 same => n,AGI(voice_bot.py,${CALLER_PHONE},${CALLED_AT})
 same => n,Hangup()

; Outbound call for callback
exten => callback,1,NoOp(Callback to ${ARG1})
 same => n,Dial(SIP/trunk/${ARG1},30,r)
 same => n,Hangup()
