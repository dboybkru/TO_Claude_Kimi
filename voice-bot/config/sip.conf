[general]
context=default
allowguest=no
udpbindaddr=0.0.0.0
tcpbindaddr=0.0.0.0
tcpenable=yes
srvlookup=yes
language=ru
disallow=all
allow=alaw
allow=ulaw
allow=g729

[robot]
type=friend
context=voicebot
host=dynamic
secret=robot_secret_123
disallow=all
allow=alaw
allow=ulaw
allow=g729
canreinvite=no
nat=yes
qualify=yes
dtmfmode=rfc2833

[trunk]
type=peer
context=voicebot
host=YOUR_SIP_PROVIDER_IP
defaultuser=YOUR_SIP_LOGIN
secret=YOUR_SIP_PASSWORD
disallow=all
allow=alaw
allow=ulaw
allow=g729
canreinvite=no
nat=yes
qualify=yes
dtmfmode=rfc2833
